name: rare-disease
description: "Investigate a MONDO rare disease: build phenome/genome/therapeutome from Monarch Initiative + ClinicalTrials.gov + ChEMBL"
license: Apache-2.0
compatibility: "Requires uv, docker, TypeDB 3.x running with rare-disease schema loaded"

# Core files
script: rare_disease.py
schema: schema.tql

# Dependencies
requires:
  bins: [uv, docker]
  env: [TYPEDB_HOST, TYPEDB_PORT, TYPEDB_DATABASE]
  optional_env: [ALHAZEN_CACHE_DIR]

# TypeDB namespaces
namespaces:
  - schema.tql

# Methodology
methodology:
  name: "MONDO-Based Rare Disease Curation"
  starting_point: "Known MONDO disease ID"
  distinction_from_apm: "APM starts from patient case → diagnosis; rare-disease starts from known MONDO ID → 360° knowledge graph"
  mechanism_model: "APM 4-category model (gain-of-function, partial-loss, total-loss, dominant-negative, toxification)"

# Design pattern
pattern: curation
phases:
  - foraging: "Discover disease from MONDO + Monarch (search-disease, init-disease)"
  - ingestion: "Pull associations: phenotypes, genes, hierarchy, similar, clinical trials, drugs"
  - sensemaking: "Claude analyzes artifacts, builds interpretive notes"
  - analysis: "Mechanism, therapeutic landscape, differential, research gaps"
  - reporting: "Disease profile, phenome, therapeutome, expert landscape"

# Core operations
operations:
  # Discovery
  - search-disease
  - init-disease

  # Ingestion
  - ingest-phenotypes
  - ingest-genes
  - ingest-hierarchy
  - ingest-similar
  - ingest-clintrials
  - ingest-drugs
  - build-corpus

  # Queries
  - list-diseases
  - show-disease
  - show-phenome
  - show-therapeutome
  - show-similar
  - show-hierarchy

  # Standard
  - list-artifacts
  - show-artifact
  - add-note
  - tag
  - search-tag

# Entity types
entities:
  collections:
    - rd-investigation
    - rd-patient-cohort
  things:
    - rd-disease
    - rd-gene
    - rd-protein
    - rd-pathway
    - rd-phenotype
    - rd-drug
    - rd-clinical-trial
    - rd-research-group
    - rd-disease-model
    - rd-biomarker
  artifacts:
    - rd-mondo-record
    - rd-monarch-assoc-record
    - rd-omim-record
    - rd-orphanet-record
    - rd-clintrials-record
    - rd-chembl-record
    - rd-gnomad-record
  fragments:
    - rd-phenotype-entry
    - rd-mechanism-claim
    - rd-drug-interaction
    - rd-expert-mention
    - rd-natural-history-datum
  notes:
    - rd-disease-overview-note
    - rd-mechanism-note
    - rd-phenotypic-spectrum-note
    - rd-diagnostic-criteria-note
    - rd-differential-note
    - rd-therapeutic-landscape-note
    - rd-expert-landscape-note
    - rd-research-gaps-note
    - rd-natural-history-note

# Relation types
relations:
  - rd-disease-has-phenotype
  - rd-gene-causes-disease
  - rd-gene-associated-with
  - rd-disease-subclass-of
  - rd-disease-similar-to
  - rd-drug-targets
  - rd-drug-indicated-for
  - rd-trial-studies
  - rd-biomarker-for
  - rd-model-recapitulates
  - rd-research-group-focuses-on

# HPO frequency qualifiers
frequency_qualifiers:
  - obligate      # 100%
  - very-frequent # 80-99%
  - frequent      # 30-79%
  - occasional    # 5-29%
  - rare          # 1-4%
  - very-rare     # <1%

# External databases
databases:
  monarch: "https://api-v3.monarchinitiative.org/v3/api/"
  clinicaltrials: "https://clinicaltrials.gov/api/v2/"
  chembl: "https://www.ebi.ac.uk/chembl/api/data/"
  mondo: "https://www.ebi.ac.uk/ols4/ontologies/mondo"
  hpo: "https://hpo.jax.org/"
  omim: "https://omim.org/"
  orphanet: "https://www.orpha.net/"

# Integration with other skills
integrates_with:
  - typedb-notebook
  - epmc-search
  - apm
